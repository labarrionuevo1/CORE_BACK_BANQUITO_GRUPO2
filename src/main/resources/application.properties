spring.application.name=banquito-core
server.port=8081

# ===============================
# CARGAR VARIABLES DESDE .env
# ===============================
spring.config.import=optional:file:.env[.properties]

# ===============================
# BASE DE DATOS - MariaDB Desplegada
# ===============================
spring.datasource.url=jdbc:mariadb://34.27.240.236:3306/banquito_core?useUnicode=true&characterEncoding=utf8
spring.datasource.username=admin
spring.datasource.password=banbanquito2
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Respeta nombres fisicos exactos del modelo SQL: CLIENTE, CUENTA, AUDITORIA_EVENTO, etc.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# ===============================
# JSON
# ===============================
spring.jackson.default-property-inclusion=non_null

# ===============================
# LOGS SQL - Desarrollo
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===============================
# SMTP / MAILPIT - Notificaciones QA
# ===============================
spring.mail.host=${SPRING_MAIL_HOST:34.27.240.236}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:5000}

app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.from=${SPRING_MAIL_FROM:notificaciones@banquito.com}

# ===============================
# ACTUATOR - Monitoreo desarrollo
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,mappings
management.endpoint.health.show-details=always